<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Docencia pequeña — Ocho puertas para transformar el aprendizaje</title>
<meta name="description" content="Ocho puertas inspiradas en Small Teaching de James M. Lang. Pequeñas intervenciones docentes para activar, conectar, motivar y expandir el aprendizaje universitario.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@200;300;400&display=swap" rel="stylesheet">

<style>
/* ────────────────────────  TOKENS  ──────────────────────── */
:root{
  --c-bg:#F1ECE2;
  --c-surface:#FAF6EC;
  --c-surfaceAlt:#EFE9DC;
  --c-ink:#1F1B16;
  --c-inkSoft:#4A4137;
  --c-inkMuted:#807260;
  --c-rule:#D6CCB8;
  --c-terracotta:#A04E2C;
  --c-olive:#5E6E3A;
  --c-indigo:#3B5066;
  --c-quoteBg:#26201A;
  --c-quoteInk:#F6EFE0;
  --c-quoteAccent:#D89A6A;

  --serif:"Newsreader", "Source Serif Pro", Georgia, serif;
  --sans:"IBM Plex Sans", system-ui, sans-serif;
  --mono:"IBM Plex Mono", ui-monospace, monospace;

  --card-pad:40px;
  --read-fs:17.5px;
  --measure:62ch;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
html{
  background:var(--c-bg);
  color:var(--c-ink);
  font-family:var(--sans);
  font-size:17px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%;
  text-size-adjust:100%;
  font-feature-settings:"kern","liga","calt";
  text-rendering:optimizeLegibility;
}
body{
  background:
    radial-gradient(ellipse at top, rgba(255,255,255,.45), transparent 70%),
    radial-gradient(ellipse at bottom right, rgba(208,180,140,.12), transparent 60%),
    var(--c-bg);
  min-height:100vh;
  overflow-x:hidden;
}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit}
::selection{background:var(--c-terracotta);color:var(--c-surface)}

/* ────────────────────────  HERO  ──────────────────────── */
.hero{
  position:relative;
  padding:80px clamp(28px,7vw,120px) 40px;
  display:flex;
  align-items:center;
}
.hero-backlink{
  position:absolute;
  top:28px;
  left:clamp(28px,7vw,120px);
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:8px 14px 8px 10px;
  border:.5px solid var(--c-rule);
  border-radius:999px;
  background:rgba(250,246,236,.5);
  -webkit-backdrop-filter:blur(8px);
  backdrop-filter:blur(8px);
  font-family:var(--mono);
  font-size:11.5px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--c-inkSoft);
  transition:all .2s ease;
}
.hero-backlink:hover{
  background:var(--c-ink);
  color:var(--c-surface);
  border-color:var(--c-ink);
}
.hero-backlink-arrow{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:18px;height:18px;
  border-radius:50%;
  background:var(--c-terracotta);
  color:var(--c-surface);
  font-family:var(--sans);
  font-size:11px;
  line-height:1;
  transition:background .2s ease;
}
.hero-backlink:hover .hero-backlink-arrow{background:var(--c-surface);color:var(--c-ink)}

/* ────────────────────────  MANIFESTO  ──────────────────────── */
.manifesto{
  padding:48px clamp(28px,7vw,120px) 40px;
  position:relative;
}
.manifesto-inner{
  max-width:980px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  gap:24px;
}
.manifesto-eyebrow{
  display:flex;
  align-items:center;
  gap:14px;
  font-family:var(--mono);
  font-size:11.5px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--c-inkMuted);
  margin:0;
}
.manifesto-eyebrow-line{
  display:inline-block;
  width:40px;
  height:1px;
  background:var(--c-terracotta);
}
.manifesto-lede{
  font-family:var(--serif);
  font-size:clamp(22px,2.4vw,30px);
  line-height:1.35;
  font-weight:400;
  color:var(--c-ink);
  margin:0;
  text-wrap:pretty;
  max-width:32ch;
}
.manifesto-lede em{font-style:italic}
.manifesto-lede strong{
  font-weight:500;
  background:linear-gradient(transparent 60%, color-mix(in oklab, var(--c-terracotta) 24%, transparent) 60%);
  padding:0 .04em;
}
.manifesto-body{
  font-family:var(--serif);
  font-size:18px;
  line-height:1.65;
  color:var(--c-inkSoft);
  margin:0;
  max-width:64ch;
  text-wrap:pretty;
}

.manifesto-voices{
  display:flex;
  flex-direction:column;
  gap:18px;
  margin:20px 0 8px;
  padding:28px 0;
  border-top:.5px solid var(--c-rule);
  border-bottom:.5px solid var(--c-rule);
}
.manifesto-voices-setup{
  margin:0 0 4px;
  font-family:var(--mono);
  font-size:11.5px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--c-inkMuted);
}
.manifesto-voice{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:14px;
  margin:0;
  font-family:var(--serif);
  font-size:clamp(17px,1.7vw,20px);
  line-height:1.5;
  color:var(--c-inkSoft);
  max-width:62ch;
  text-wrap:pretty;
}
.manifesto-voice em{font-style:italic}
.manifesto-voice-text{display:block}
.manifesto-voice-attr{
  display:block;
  margin-top:6px;
  font-family:var(--serif);
  font-style:normal;
  font-size:14.5px;
  color:var(--c-inkMuted);
  letter-spacing:.005em;
}
.manifesto-voice-mark{
  font-family:var(--serif);
  font-size:1.2em;
  line-height:1.3;
  color:var(--c-inkMuted);
  align-self:start;
}
.manifesto-voice-pro .manifesto-voice-mark{color:var(--c-olive)}
.manifesto-voice-con .manifesto-voice-mark{color:var(--c-indigo)}

.manifesto-prompt{
  margin-top:24px;
  display:flex;
  align-items:center;
  gap:24px;
}
.manifesto-prompt-rule{
  flex:1;
  height:1px;
  background:var(--c-rule);
}
.manifesto-prompt p{
  margin:0;
  font-family:var(--serif);
  font-style:italic;
  font-size:clamp(20px,2.2vw,26px);
  font-weight:400;
  line-height:1.35;
  color:var(--c-ink);
  text-align:center;
  text-wrap:balance;
  max-width:40ch;
}
.manifesto-prompt p em{
  font-style:italic;
  color:var(--c-terracotta);
}

@media (max-width: 760px){
  .manifesto-voice{font-size:17px}
}
@media (max-width: 640px){
  .manifesto{padding:32px 22px 24px}
  .manifesto-inner{gap:20px}
  .manifesto-lede{font-size:20px}
  .manifesto-body{font-size:16px;line-height:1.6}
  .manifesto-voices{padding:20px 0;gap:14px}
  .manifesto-voice{font-size:17px}
  .manifesto-prompt{gap:14px;margin-top:16px}
  .manifesto-prompt p{font-size:19px}
}
.hero-inner{
  max-width:1080px;
  margin:0 auto;
  width:100%;
}
.hero-kicker{
  display:inline-flex;
  align-items:center;
  gap:10px;
  font-family:var(--mono);
  font-size:12.5px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--c-inkMuted);
  margin-bottom:48px;
  padding-bottom:18px;
  border-bottom:.5px solid var(--c-rule);
}
.hero-kicker .dot{
  display:inline-block;
  width:6px;height:6px;border-radius:50%;
  background:var(--c-terracotta);
}
.hero-kicker em{font-style:italic;font-family:var(--serif);text-transform:none;letter-spacing:0;font-size:14px;color:var(--c-ink)}
.hero-title{
  font-family:var(--serif);
  font-weight:400;
  font-size:clamp(48px,7.5vw,108px);
  line-height:.96;
  letter-spacing:-.025em;
  margin:0 0 32px;
  color:var(--c-ink);
  text-wrap:balance;
}
.hero-title-soft{
  font-style:italic;
  font-weight:300;
  color:var(--c-inkSoft);
}
.hero-sub{
  font-family:var(--serif);
  font-size:clamp(20px,2vw,26px);
  line-height:1.4;
  font-weight:400;
  font-style:italic;
  color:var(--c-inkSoft);
  max-width:48ch;
  margin:0 0 40px;
  text-wrap:balance;
}
.hero-intro{
  font-size:17px;
  line-height:1.65;
  color:var(--c-inkSoft);
  max-width:54ch;
  margin:0;
}
.hero-intro em{
  font-family:var(--serif);
  font-style:italic;
  color:var(--c-ink);
  font-size:1.05em;
}
.hero-cta{
  display:inline-flex;
  align-items:center;
  gap:14px;
  padding:16px 24px;
  background:var(--c-ink);
  color:var(--c-surface);
  border-radius:999px;
  font-family:var(--mono);
  font-size:13px;
  letter-spacing:.06em;
  text-transform:uppercase;
  transition:transform .2s ease, background .2s ease;
}
.hero-cta:hover{
  transform:translateY(-1px);
  background:var(--c-terracotta);
}
.hero-cta span{font-family:var(--sans);font-size:18px;line-height:1}

/* ────────────────────────  TABS  ──────────────────────── */
.content{
  padding:0 clamp(28px,7vw,120px);
  padding-bottom:120px;
}
.tabs-anchor{
  max-width:1180px;
  margin:0 auto;
  padding-top:24px;
  scroll-margin-top:8px;
}
.tabs{
  position:sticky;
  top:8px;
  z-index:40;
  background:rgba(241,236,226,.86);
  -webkit-backdrop-filter:blur(16px) saturate(140%);
  backdrop-filter:blur(16px) saturate(140%);
  border:.5px solid var(--c-rule);
  border-radius:14px;
  padding:8px;
  margin-bottom:48px;
  box-shadow:0 1px 0 rgba(255,255,255,.6) inset;
}
.tabs-rail{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:4px;
}
.tab{
  display:flex;
  align-items:center;
  gap:18px;
  padding:14px 20px;
  background:transparent;
  border:0;
  border-radius:10px;
  text-align:left;
  cursor:pointer;
  color:var(--c-inkMuted);
  transition:all .25s ease;
  position:relative;
}
.tab:hover{
  color:var(--c-ink);
  background:rgba(255,255,255,.4);
}
.tab.is-active{
  background:var(--c-surface);
  color:var(--c-ink);
  box-shadow:0 1px 0 rgba(255,255,255,.7) inset,
             0 6px 20px -10px rgba(40,30,15,.18);
}
.tab[data-acto="conocer"].is-active{--tab-accent:var(--c-terracotta)}
.tab[data-acto="comprender"].is-active{--tab-accent:var(--c-olive)}
.tab[data-acto="inspirar"].is-active{--tab-accent:var(--c-indigo)}
.tab.is-active::before{
  content:"";
  position:absolute;
  left:20px;right:20px;
  bottom:6px;height:2px;
  background:var(--tab-accent,var(--c-ink));
  border-radius:1px;
}
.tab-roman{
  font-family:var(--serif);
  font-style:italic;
  font-size:32px;
  font-weight:400;
  line-height:.9;
  color:var(--tab-accent,var(--c-inkMuted));
  transition:color .25s ease;
  letter-spacing:-.02em;
}
.tab.is-active .tab-roman{color:var(--tab-accent)}
.tab-body{display:flex;flex-direction:column;gap:2px;min-width:0}
.tab-kicker{
  font-family:var(--mono);
  font-size:10.5px;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--c-inkMuted);
}
.tab-name{
  font-family:var(--serif);
  font-size:22px;
  font-weight:500;
  letter-spacing:-.01em;
  line-height:1.1;
  color:inherit;
}
.tabs-progress{display:none}

@media (max-width: 760px){
  .tabs-rail{grid-template-columns:1fr}
  .tab{padding:12px 16px}
  .tab-name{font-size:18px}
  .tab-roman{font-size:26px}
}
@media (min-width: 761px) and (max-width: 920px){
  /* iPad portrait + small laptops: tighten tab content */
  .tab{padding:12px 14px;gap:12px}
  .tab-roman{font-size:26px}
  .tab-name{font-size:18px}
  .tab-kicker{font-size:9.5px}
}

/* ────────────────────────  ACTO PANEL  ──────────────────────── */
.acto-stage{
  max-width:1180px;
  margin:0 auto;
}
.acto{
  scroll-margin-top:80px;
  margin-bottom:120px;
}
.acto-header{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:48px;
  align-items:start;
  margin-bottom:64px;
  padding-bottom:36px;
  border-bottom:.5px solid var(--c-rule);
}
.acto-meta{display:flex;align-items:flex-start}
.acto-roman{
  font-family:var(--serif);
  font-size:clamp(96px,13vw,200px);
  font-weight:300;
  font-style:italic;
  line-height:.78;
  letter-spacing:-.025em;
  color:var(--c-ink);
}
.acto-conocer .acto-roman{color:var(--c-terracotta)}
.acto-comprender .acto-roman{color:var(--c-olive)}
.acto-inspirar .acto-roman{color:var(--c-indigo)}
.acto-textblock{
  display:flex;
  flex-direction:column;
  gap:16px;
  padding-top:18px;
}
.acto-kicker{
  font-family:var(--mono);
  font-size:11.5px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--c-inkMuted);
}
.acto-title{
  font-family:var(--serif);
  font-size:clamp(44px,5.5vw,72px);
  font-weight:400;
  letter-spacing:-.02em;
  line-height:1;
  margin:0;
}
.acto-blurb{
  font-family:var(--serif);
  font-size:clamp(18px,1.6vw,22px);
  line-height:1.45;
  font-style:italic;
  color:var(--c-inkSoft);
  margin:0;
  max-width:48ch;
  text-wrap:balance;
}
@media (max-width: 720px){
  .acto-header{grid-template-columns:1fr;gap:8px}
}

/* ────────────────────────  CARDS  ──────────────────────── */
.card-grid{
  list-style:none;
  margin:0;
  padding:0;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(380px,1fr));
  gap:28px;
}
.card{
  position:relative;
  background:var(--c-surface);
  border:.5px solid var(--c-rule);
  border-radius:10px;
  transition:box-shadow .55s cubic-bezier(.22,.7,.2,1),
             transform .55s cubic-bezier(.22,.7,.2,1),
             border-color .4s ease,
             grid-column .01s linear;
  overflow:hidden;
}
.card.is-expanded{overflow:visible}

/* Decorative accent: a colored "tab" peeking from the top edge */
.card::after{
  content:"";
  position:absolute;
  top:-1px;left:32px;
  width:48px;height:10px;
  background:var(--accent, var(--c-ink));
  border-radius:0 0 4px 4px;
  opacity:.85;
  transform-origin:top;
  transition:transform .35s cubic-bezier(.2,.7,.2,1), height .35s ease, opacity .25s ease;
}
.card-conocer{--accent:var(--c-terracotta)}
.card-comprender{--accent:var(--c-olive)}
.card-inspirar{--accent:var(--c-indigo)}

.card:hover,
.card.is-expanded{
  box-shadow:0 1px 0 rgba(255,255,255,.7) inset,
             0 24px 50px -22px rgba(40,30,15,.22);
  border-color:color-mix(in oklab, var(--accent) 30%, var(--c-rule));
  transform:translateY(-2px);
}
.card.is-expanded{transform:none}
.card:hover::after{
  height:16px;
  transform:scaleX(1.6) translateX(-9px);
  opacity:1;
}
.card.is-expanded::after{
  height:14px;
  transform:scaleX(1.4) translateX(-7px);
  opacity:1;
}
.card.is-expanded{
  grid-column:1/-1;
  background:var(--c-surface);
}

.card-toggle{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:24px;
  width:100%;
  text-align:left;
  background:none;
  border:0;
  padding:var(--card-pad);
  padding-right:calc(var(--card-pad) - 8px);
  cursor:pointer;
}
.card.is-expanded .card-toggle{
  padding-bottom:24px;
  border-bottom:.5px solid var(--c-rule);
  cursor:default;
}

/* Left rail with big chapter number */
.card-rail{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  padding-top:4px;
  position:relative;
}
.card-rail-num{
  font-family:var(--mono);
  font-weight:200;
  font-size:clamp(70px,7vw,96px);
  line-height:.85;
  color:var(--accent);
  letter-spacing:-.04em;
  font-variant-numeric:tabular-nums;
  transition:transform .35s cubic-bezier(.2,.7,.2,1);
}
.card:hover .card-rail-num{transform:translateY(-3px)}
.card-rail-line{
  width:1px;
  flex:1;
  background:linear-gradient(to bottom, var(--accent) 0%, transparent 100%);
  opacity:.35;
  min-height:24px;
}
.card-rail-meta{
  font-family:var(--mono);
  font-size:9.5px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--c-inkMuted);
  writing-mode:vertical-rl;
  transform:rotate(180deg);
  padding:8px 0 4px;
}

/* Body: header / oneliner / toc / question / footer */
.card-body{
  display:flex;
  flex-direction:column;
  gap:20px;
  min-width:0;
}
.card-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:18px;
}
.card-titleblock{display:flex;flex-direction:column;gap:6px;min-width:0}
.card-kicker{
  font-family:var(--mono);
  font-size:10.5px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--c-inkMuted);
}
.card-title{
  font-family:var(--serif);
  font-size:clamp(30px,3.2vw,40px);
  font-weight:500;
  letter-spacing:-.018em;
  margin:0;
  line-height:1;
  color:var(--c-ink);
  text-wrap:balance;
}
.card-chevron{
  font-family:var(--sans);
  font-size:18px;
  color:var(--c-inkMuted);
  width:36px;height:36px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  border:.5px solid var(--c-rule);
  background:var(--c-surface);
  transition:all .25s ease;
  flex-shrink:0;
  align-self:flex-start;
  margin-top:4px;
}
.card:hover .card-chevron{
  background:var(--accent);
  color:var(--c-surface);
  border-color:var(--accent);
  transform:translateX(3px);
}
.card.is-expanded .card-chevron{
  background:var(--c-ink);
  color:var(--c-surface);
  border-color:var(--c-ink);
}

/* Pull-quote one-liner */
.card-oneliner{
  position:relative;
  padding:14px 18px 14px 22px;
  font-family:var(--serif);
  font-size:18px;
  line-height:1.45;
  font-style:italic;
  color:var(--c-ink);
  margin:0;
  background:var(--c-surfaceAlt);
  border-left:2px solid var(--accent);
  border-radius:0 4px 4px 0;
  text-wrap:pretty;
}
.card-oneliner-mark{
  position:absolute;
  top:-2px;left:6px;
  font-family:var(--serif);
  font-size:34px;
  line-height:1;
  color:var(--accent);
  opacity:.4;
}

/* Mini table of contents preview */
.card-toc-preview{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding-top:4px;
}
.card-toc-label{
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--c-inkMuted);
}
.card-toc-list{
  list-style:none;
  margin:0;
  padding:0;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.card-toc-list li{
  display:grid;
  grid-template-columns:14px 1fr;
  gap:6px;
  font-family:var(--serif);
  font-size:15px;
  line-height:1.4;
  color:var(--c-inkSoft);
  text-wrap:pretty;
}
.card-toc-bullet{
  color:var(--accent);
  font-weight:500;
  text-align:center;
  line-height:1.35;
}
.card-toc-more{
  font-style:italic;
  opacity:.75;
}

/* Reflective question — revealed on hover/expanded */
.card-question{
  display:flex;
  align-items:flex-start;
  gap:12px;
  padding-top:14px;
  border-top:.5px dashed var(--c-rule);
  opacity:0;
  max-height:0;
  overflow:hidden;
  transition:opacity .35s ease, max-height .4s ease, padding-top .3s ease;
}
.card-question.is-visible{
  opacity:1;
  max-height:180px;
  padding-top:14px;
}
.card-question-mark{
  font-family:var(--serif);
  font-style:italic;
  font-size:24px;
  line-height:1;
  color:var(--accent);
  font-weight:500;
  margin-top:-2px;
}
.card-question p{
  margin:0;
  font-family:var(--serif);
  font-style:italic;
  font-size:15.5px;
  line-height:1.45;
  color:var(--c-inkSoft);
  text-wrap:pretty;
}

/* Footer: meta on left, CTA on right */
.card-footer{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  padding-top:14px;
  margin-top:auto;
  border-top:.5px solid var(--c-rule);
  flex-wrap:wrap;
}
.card-meta{
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:.06em;
  color:var(--c-inkMuted);
  font-variant-numeric:tabular-nums;
}
.card-meta-dot{
  display:inline-block;
  width:6px;height:6px;
  border-radius:50%;
  background:var(--accent);
}
.card-cta-hint{
  display:inline-flex;
  align-items:center;
  gap:10px;
  font-family:var(--mono);
  font-size:11.5px;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--c-ink);
  transition:color .2s ease;
}
.card:hover .card-cta-hint{color:var(--accent)}
.card-cta-arrow{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:24px;height:24px;
  border-radius:50%;
  background:var(--accent);
  color:var(--c-surface);
  font-family:var(--sans);
  font-size:13px;
  line-height:1;
  transition:transform .25s ease;
}
.card:hover .card-cta-arrow{transform:translateX(3px)}

/* ────────────────────────  READING VIEW  ──────────────────────── */
.reading{
  animation:readingEnter .65s cubic-bezier(.22,.7,.2,1) both;
  background:var(--c-surface);
  transform-origin:top center;
}
@keyframes readingEnter{
  0%{opacity:0;transform:translateY(16px) scale(.985)}
  60%{opacity:1}
  100%{opacity:1;transform:none}
}
.reading-aside{
  animation:readingAsideEnter .7s .15s cubic-bezier(.22,.7,.2,1) both;
}
.reading-main{
  animation:readingMainEnter .7s .25s cubic-bezier(.22,.7,.2,1) both;
}
.reading-main > * { animation:readingChildEnter .5s cubic-bezier(.22,.7,.2,1) both }
.reading-main > *:nth-child(1){animation-delay:.32s}
.reading-main > *:nth-child(2){animation-delay:.38s}
.reading-main > *:nth-child(3){animation-delay:.44s}
.reading-main > *:nth-child(4){animation-delay:.50s}
.reading-main > *:nth-child(n+5){animation-delay:.56s}
@keyframes readingAsideEnter{
  from{opacity:0;transform:translateX(-12px)}
  to{opacity:1;transform:none}
}
@keyframes readingMainEnter{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:none}
}
@keyframes readingChildEnter{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:none}
}
.reading-inner{
  display:grid;
  grid-template-columns:minmax(280px,320px) 1fr;
  gap:0;
}
@media (max-width: 980px){
  .reading-inner{grid-template-columns:1fr}
}
.reading-aside{
  border-right:.5px solid var(--c-rule);
  background:var(--c-surfaceAlt);
  position:relative;
}
@media (max-width: 980px){
  .reading-aside{border-right:0;border-bottom:.5px solid var(--c-rule)}
}
.reading-sticky{
  position:sticky;
  top:96px;
  padding:48px 40px;
  display:flex;
  flex-direction:column;
  gap:24px;
}
@media (max-width: 980px){
  .reading-sticky{position:static;padding:36px 32px}
}
.reading-aside-num{
  font-family:var(--mono);
  font-weight:200;
  font-size:96px;
  line-height:.85;
  color:var(--accent);
  letter-spacing:-.02em;
}
.reading-aside-meta{
  display:flex;
  align-items:center;
  gap:8px;
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--c-inkMuted);
}
.reading-aside-dot{font-size:14px;line-height:1}
.reading-question-block{
  padding:20px 0;
  border-top:.5px solid var(--c-rule);
  border-bottom:.5px solid var(--c-rule);
}
.reading-question-label{
  display:block;
  font-family:var(--mono);
  font-size:10.5px;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--c-inkMuted);
  margin-bottom:10px;
}
.reading-question-text{
  font-family:var(--serif);
  font-style:italic;
  font-size:19px;
  line-height:1.4;
  color:var(--c-ink);
  margin:0;
  text-wrap:pretty;
}
.reading-toc{
  display:flex;
  flex-direction:column;
  gap:2px;
}
.reading-toc-item{
  display:grid;
  grid-template-columns:32px 1fr;
  gap:10px;
  padding:10px 0;
  font-size:14px;
  line-height:1.4;
  color:var(--c-inkSoft);
  border-top:.5px solid transparent;
  transition:color .2s ease;
}
.reading-toc-item:hover{color:var(--c-ink)}
.reading-toc-item:hover .reading-toc-num{color:var(--accent)}
.reading-toc-num{
  font-family:var(--mono);
  font-size:11px;
  color:var(--c-inkMuted);
  letter-spacing:.05em;
  text-align:right;
  transition:color .2s ease;
}
.reading-toc-item-alt .reading-toc-num{
  font-family:var(--serif);
  font-size:13px;
  font-style:italic;
  color:var(--accent);
}
.reading-toc-label{
  font-family:var(--serif);
  font-size:15px;
}

.reading-main{
  padding:64px clamp(32px,5vw,72px);
  max-width:780px;
}
.reading-header{
  margin-bottom:48px;
  padding-bottom:32px;
  border-bottom:.5px solid var(--c-rule);
}
.reading-eyebrow{
  font-family:var(--mono);
  font-size:11.5px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--c-inkMuted);
  margin:0 0 18px;
}
.reading-title{
  font-family:var(--serif);
  font-size:clamp(40px,4.5vw,60px);
  font-weight:400;
  letter-spacing:-.02em;
  line-height:1;
  margin:0 0 20px;
  color:var(--c-ink);
  text-wrap:balance;
}
.reading-lede{
  font-family:var(--serif);
  font-style:italic;
  font-weight:400;
  font-size:clamp(20px,2vw,24px);
  line-height:1.4;
  color:var(--c-inkSoft);
  margin:0;
  max-width:48ch;
  text-wrap:pretty;
}

/* Sections inside reading view */
.rsection{margin-bottom:48px}
.rsection-heading{
  display:flex;
  align-items:baseline;
  gap:14px;
  font-family:var(--serif);
  font-size:clamp(22px,2.2vw,28px);
  font-weight:500;
  letter-spacing:-.012em;
  line-height:1.15;
  margin:0 0 18px;
  color:var(--c-ink);
  text-wrap:balance;
}
.rsection-num{
  font-family:var(--mono);
  font-weight:300;
  font-size:14px;
  color:var(--accent);
  letter-spacing:.05em;
}
.rsection-p{
  font-family:var(--serif);
  font-size:var(--read-fs);
  line-height:1.65;
  color:var(--c-ink);
  margin:0 0 16px;
  text-wrap:pretty;
}
.rsection-p:last-child{margin-bottom:0}
.rsection-bullets{
  list-style:none;
  margin:18px 0;
  padding:0;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.rsection-bullets li{
  position:relative;
  padding-left:24px;
  font-family:var(--serif);
  font-size:calc(var(--read-fs) - 1px);
  line-height:1.55;
  color:var(--c-inkSoft);
  text-wrap:pretty;
}
.rsection-bullets li::before{
  content:"";

  left:8px;top:.7em;

  background:var(--accent);
}
.rsection-steps{
  list-style:none;
  margin:20px 0;
  padding:0;
  display:flex;
  flex-direction:column;
  gap:14px;
}
.rsection-steps li{
  display:grid;
  grid-template-columns:32px 1fr;
  gap:18px;
  padding:14px 0;
  border-top:.5px solid var(--c-rule);
  align-items:start;
}
.rsection-steps li:last-child{border-bottom:.5px solid var(--c-rule)}
.rsection-step-num{
  font-family:var(--mono);
  font-weight:300;
  font-size:24px;
  line-height:1;
  color:var(--accent);
  letter-spacing:-.02em;
}
.rsection-step-text{
  font-family:var(--serif);
  font-size:var(--read-fs);
  line-height:1.55;
  color:var(--c-ink);
}
.rsection-sub{margin-top:24px}
.rsection-sub-heading{
  font-family:var(--serif);

  font-weight:500;
  font-size:19px;
  letter-spacing:-.005em;
  color:var(--c-ink);
  margin:0 0 10px;
}

/* Key ideas block (highlight) */

  border-radius:6px;

}
.ideas-block::before{
  content:"";

  width:3px;height:100%;

}
.ideas-header{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:20px;
}
.ideas-glyph{color:var(--accent);font-size:14px}
.ideas-label{
  font-family:var(--mono);
  font-size:11.5px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--c-inkMuted);
}
.ideas-list{
  list-style:none;
  margin:0;padding:0;
  display:flex;
  flex-direction:column;
  gap:14px;
}
.ideas-list li{
  display:grid;
  grid-template-columns:24px 1fr;
  gap:14px;
  font-family:var(--serif);
  font-size:18px;
  line-height:1.45;
  color:var(--c-ink);

}
.ideas-num{
  font-family:var(--mono);
  font-weight:300;
  font-size:18px;
  color:var(--accent);

}

/* IA block */

  margin:56px 0 32px;

  overflow:hidden;
}

  content:"";

  top:0;right:0;

  transform:translate(40%,-40%);
}
.ia-header{
  display:flex;
  align-items:flex-start;
  gap:16px;
  margin-bottom:18px;
  position:relative;
}

  font-family:var(--serif);

  font-size:24px;

}
.ia-p{
  font-family:var(--serif);
  font-size:17px;
  line-height:1.6;

  margin:0 0 18px;

  max-width:60ch;
  opacity:.92;
}
.ia-bullets{

  flex-direction:column;

}
.ia-bullet-mark{
  color:var(--c-quoteAccent);
  font-family:var(--mono);
  font-size:14px;
  line-height:1.4;
}

.reading-close-row{
  margin-top:48px;
  padding-top:32px;
  border-top:.5px solid var(--c-rule);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:24px;
  flex-wrap:wrap;
}
.reading-close{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:14px 22px;
  border:.5px solid var(--c-rule);
  border-radius:999px;
  background:transparent;
  color:var(--c-ink);
  cursor:pointer;
  font-family:var(--mono);
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
  transition:all .2s ease;
}
.reading-close:hover{
  background:var(--c-ink);
  color:var(--c-surface);
  border-color:var(--c-ink);
}
.reading-close-note{
  font-family:var(--serif);
  font-style:italic;
  font-size:16px;
  color:var(--c-inkMuted);
  margin:0;
}

/* Floating back-to-chapter-top button */
.reading-fab{
  position:fixed;
  right:24px;
  bottom:24px;
  z-index:60;
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:12px 18px 12px 14px;
  background:var(--c-ink);
  color:var(--c-surface);
  border:0;
  border-radius:999px;
  cursor:pointer;
  font-family:var(--mono);
  font-size:11.5px;
  letter-spacing:.08em;
  text-transform:uppercase;
  box-shadow:0 12px 30px -8px rgba(40,30,15,.35),
             0 2px 0 rgba(255,255,255,.06) inset;
  opacity:0;
  transform:translateY(12px);
  pointer-events:none;
  transition:opacity .25s ease, transform .25s ease, background .2s ease;
}
.reading-fab.is-visible{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}
.reading-fab:hover{background:var(--c-terracotta)}
.reading-fab-arrow{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:22px;height:22px;
  border-radius:50%;
  background:rgba(255,255,255,.12);
  font-family:var(--sans);
  font-size:13px;
  line-height:1;
}
@media (max-width: 600px){
  .reading-fab{
    right:16px;bottom:16px;
    padding:10px 14px 10px 10px;
  }
  .reading-fab span:not(.reading-fab-arrow){display:none}
  .reading-fab{padding:10px}
}

/* ────────────────────────  INVITATION  ──────────────────────── */
.invitation{
  max-width:1180px;
  margin:0 auto;
  display:grid;
  grid-template-columns:5fr 6fr;
  gap:0;
  background:var(--c-surface);
  border:.5px solid var(--c-rule);
  border-radius:6px;
  overflow:hidden;
}
@media (max-width: 880px){
  .invitation{grid-template-columns:1fr}
}
.invitation-quote{
  background:var(--c-quoteBg);
  color:var(--c-quoteInk);
  padding:64px 56px;
  position:relative;
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-height:480px;
}
.quote-mark{
  position:absolute;
  top:32px;left:36px;
  font-family:var(--serif);
  font-size:160px;
  font-style:italic;
  line-height:.7;
  color:var(--c-quoteAccent);
  opacity:.55;
}
.invitation-quote blockquote{
  font-family:var(--serif);
  font-size:clamp(22px,2.2vw,28px);
  font-style:italic;
  font-weight:400;
  line-height:1.4;
  margin:0 0 40px;
  position:relative;
  z-index:1;
  text-wrap:pretty;
  max-width:36ch;
}
.invitation-quote cite{
  display:flex;
  flex-direction:column;
  font-style:normal;
  gap:4px;
}
.cite-name{
  font-family:var(--serif);
  font-size:16px;
  letter-spacing:.005em;
  color:var(--c-quoteInk);
}
.cite-work{
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--c-quoteAccent);
}
.cite-work em{
  font-family:var(--serif);
  font-style:italic;
  text-transform:none;
  letter-spacing:0;
  font-size:12.5px;
  color:var(--c-quoteAccent);
}
.invitation-body{
  padding:64px 56px;
  display:flex;
  flex-direction:column;
  gap:18px;
}
.invitation-eyebrow{
  font-family:var(--mono);
  font-size:11.5px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--c-inkMuted);
  margin:0;
}
.invitation-title{
  font-family:var(--serif);
  font-size:clamp(32px,3.5vw,44px);
  font-weight:400;
  line-height:1.1;
  letter-spacing:-.015em;
  margin:0 0 8px;
  text-wrap:balance;
}
.invitation-title em{font-style:italic;color:var(--c-terracotta)}
.invitation-text{
  font-size:16px;
  line-height:1.6;
  color:var(--c-inkSoft);
  margin:0 0 24px;
  max-width:44ch;
}

/* ── Commitment form ── */
.commitment{
  display:flex;
  flex-direction:column;
  gap:20px;
}
.commitment-row{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.commitment-label{
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--c-inkMuted);
}
.select-wrap{
  position:relative;
}
.commitment select,
.commitment textarea{
  width:100%;
  font-family:var(--serif);
  font-size:17px;
  line-height:1.45;
  color:var(--c-ink);
  background:var(--c-surfaceAlt);
  border:.5px solid var(--c-rule);
  border-radius:4px;
  padding:14px 16px;
  appearance:none;
  resize:vertical;
  transition:border-color .2s ease, background .2s ease;
}
.commitment select{
  padding-right:40px;
  cursor:pointer;
}
.commitment select:focus,
.commitment textarea:focus{
  outline:none;
  border-color:var(--c-terracotta);
  background:var(--c-surface);
}
.commitment textarea::placeholder{
  color:var(--c-inkMuted);
  font-style:italic;
}
.select-chevron{
  position:absolute;
  right:16px;top:50%;
  transform:translateY(-50%);
  pointer-events:none;
  color:var(--c-inkMuted);
  font-size:12px;
}
.commitment-actions{
  display:flex;
  gap:12px;
  align-items:center;
  margin-top:8px;
}
.commitment-save,
.commitment-edit,
.commitment-clear,
.commitment-cancel{
  font-family:var(--mono);
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
  padding:12px 22px;
  border-radius:999px;
  border:.5px solid var(--c-ink);
  background:var(--c-ink);
  color:var(--c-surface);
  cursor:pointer;
  transition:all .2s ease;
}
.commitment-save:hover:not(:disabled){
  background:var(--c-terracotta);
  border-color:var(--c-terracotta);
  transform:translateY(-1px);
}
.commitment-save:disabled{
  opacity:.35;
  cursor:not-allowed;
}
.commitment-edit,
.commitment-cancel{
  background:transparent;
  color:var(--c-ink);
}
.commitment-edit:hover,
.commitment-cancel:hover{background:var(--c-surfaceAlt)}
.commitment-clear{
  background:transparent;
  border-color:var(--c-rule);
  color:var(--c-inkMuted);
}
.commitment-clear:hover{
  color:var(--c-terracotta);
  border-color:var(--c-terracotta);
}

.commitment-saved-card{
  background:var(--c-surfaceAlt);
  border:.5px solid var(--c-rule);
  border-radius:6px;
  padding:32px 32px 28px;
  position:relative;
  overflow:hidden;
}
.commitment-saved-card::before{
  content:"";
  position:absolute;
  left:0;top:0;bottom:0;
  width:3px;
  background:var(--c-terracotta);
}
.commitment-saved-eyebrow{
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--c-inkMuted);
  margin:0 0 14px;
}
.commitment-saved-chapter{
  display:flex;
  align-items:baseline;
  gap:14px;
  font-family:var(--serif);
  font-size:24px;
  font-weight:500;
  margin:0 0 14px;
  color:var(--c-ink);
}
.commitment-saved-num{
  font-family:var(--mono);
  font-weight:300;
  font-size:22px;
  color:var(--c-terracotta);
}
.commitment-saved-text{
  font-family:var(--serif);
  font-style:italic;
  font-size:18px;
  line-height:1.5;
  color:var(--c-inkSoft);
  margin:0 0 22px;
  text-wrap:pretty;
}
.commitment-saved-note{
  margin:16px 0 0;
  font-size:13px;
  color:var(--c-inkMuted);
  line-height:1.55;
  max-width:50ch;
}

/* ────────────────────────  FOOTER  ──────────────────────── */
.footer{
  border-top:.5px solid var(--c-rule);
  padding:48px clamp(28px,7vw,120px);
  margin-top:80px;
  background:var(--c-surfaceAlt);
}
.footer-inner{
  max-width:1180px;
  margin:0 auto;
  display:flex;
  justify-content:space-between;
  align-items:start;
  gap:48px;
  flex-wrap:wrap;
}
.footer-line{
  margin:0;
  font-size:13px;
  line-height:1.6;
  color:var(--c-inkMuted);
  max-width:64ch;
}
.footer-line em{font-family:var(--serif);font-style:italic;color:var(--c-inkSoft)}
.footer-text{
  display:flex;
  flex-direction:column;
  gap:24px;
  max-width:64ch;
}
.footer-buy{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  gap:20px;
  padding:18px 22px;
  border:.5px solid var(--c-rule);
  border-radius:8px;
  background:var(--c-surface);
  color:var(--c-ink);
  transition:all .2s ease;
  max-width:480px;
}
.footer-buy:hover{
  background:var(--c-ink);
  color:var(--c-surface);
  border-color:var(--c-ink);
  transform:translateY(-1px);
}
.footer-buy-cover{
  width:72px;
  height:auto;
  border-radius:3px;
  box-shadow:0 6px 16px -6px rgba(40,30,15,.35),
             0 1px 2px rgba(40,30,15,.15);
  display:block;
  align-self:stretch;
  object-fit:cover;
}
.footer-buy-body{
  display:flex;
  flex-direction:column;
  gap:4px;
  min-width:0;
}
.footer-buy-label{
  font-family:var(--mono);
  font-size:10.5px;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--c-inkMuted);
  transition:color .2s ease;
}
.footer-buy:hover .footer-buy-label{color:var(--c-quoteAccent)}
.footer-buy-title{
  font-family:var(--serif);
  font-size:20px;
  font-weight:500;
  line-height:1.15;
  letter-spacing:-.005em;
}
.footer-buy-title em{font-style:italic}
.footer-buy-meta{
  font-family:var(--sans);
  font-size:12.5px;
  line-height:1.45;
  color:var(--c-inkSoft);
  transition:color .2s ease;
}
.footer-buy:hover .footer-buy-meta{color:rgba(246,239,224,.8)}
.footer-buy-orig{
  font-size:11.5px;
  color:var(--c-inkMuted);
}
.footer-buy:hover .footer-buy-orig{color:rgba(246,239,224,.6)}
.footer-buy-orig em{font-family:var(--serif);font-style:italic}
.footer-buy-arrow{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:36px;height:36px;
  border-radius:50%;
  background:var(--c-terracotta);
  color:var(--c-surface);
  font-family:var(--sans);
  font-size:16px;
  transition:transform .2s ease;
  flex-shrink:0;
}
.footer-buy:hover .footer-buy-arrow{transform:rotate(45deg)}

@media (max-width: 640px){
  .footer-buy{
    gap:14px;
    padding:14px 16px;
  }
  .footer-buy-arrow{
    width:28px;height:28px;
    font-size:14px;
  }
}
.footer-meta{
  margin:0;
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--c-inkMuted);
}

/* ──────────────────────── FOCUS ──────────────────────── */
button:focus-visible,
a:focus-visible,
select:focus-visible,
textarea:focus-visible{
  outline:2px solid var(--c-terracotta);
  outline-offset:3px;
  border-radius:4px;
}

/* ──────────────────────── TABLET ──────────────────────── */
@media (max-width: 880px){
  .content{padding:0 24px;padding-bottom:96px}
  .acto-stage{padding:0}
  .tabs-anchor{padding-top:16px}
  .acto{margin-bottom:80px}
  .acto-header{margin-bottom:48px;padding-bottom:24px;gap:24px}
  .card-grid{grid-template-columns:1fr;gap:18px}
}

/* ──────────────────────── MOBILE ──────────────────────── */
@media (max-width: 640px){
  html{font-size:16px}
  .hero{
    padding:64px 22px 56px;
    min-height:auto;
  }
  .hero-backlink{
    top:18px;
    left:18px;
    padding:6px 12px 6px 8px;
    font-size:10.5px;
  }
  .hero-backlink-arrow{width:16px;height:16px;font-size:10px}
  .hero-kicker{
    margin-bottom:32px;
    padding-bottom:14px;
    font-size:11px;
    gap:8px;
  }
  .hero-kicker em{font-size:12.5px}
  .hero-title{margin-bottom:24px}
  .hero-sub{font-size:18px;margin-bottom:28px;line-height:1.35}
  .hero-intro{font-size:15.5px;margin-bottom:0;line-height:1.6}

  .content{padding:0 18px;padding-bottom:64px}

  .tabs{padding:6px;border-radius:12px;margin-bottom:32px;top:6px}
  .tab{padding:10px 14px;gap:14px;border-radius:8px}
  .tab.is-active::before{left:14px;right:14px;bottom:5px}
  .tab-roman{font-size:24px}
  .tab-name{font-size:17px}
  .tab-kicker{font-size:10px}

  .acto-roman{font-size:84px}
  .acto-title{font-size:38px}
  .acto-blurb{font-size:17px}

  .card-toggle{
    padding:24px 22px;
    grid-template-columns:auto 1fr;
    gap:16px;
  }
  .card-rail{padding-top:0;gap:8px}
  .card-rail-num{font-size:54px;line-height:.88}
  .card-rail-line{display:none}
  .card-rail-meta{display:none}
  .card-body{gap:16px}
  .card-head{gap:12px}
  .card-kicker{font-size:9.5px}
  .card-title{font-size:26px}
  .card-chevron{width:32px;height:32px;font-size:16px;margin-top:2px}
  .card-oneliner{font-size:16px;padding:12px 14px 12px 18px}
  .card-oneliner-mark{font-size:28px;top:-1px;left:4px}
  .card-toc-label{font-size:9.5px}
  .card-toc-list li{font-size:14px;line-height:1.35}
  .card-question{padding-top:12px;gap:10px}
  .card-question-mark{font-size:20px}
  .card-question p{font-size:14.5px}
  .card-footer{padding-top:12px;gap:12px}
  .card-meta{font-size:10.5px}
  .card-cta-hint{font-size:10.5px}
  .card-cta-arrow{width:22px;height:22px;font-size:12px}

  /* Reading view stacks: aside is compact, content takes full width */
  .reading-sticky{padding:28px 22px;gap:18px}
  .reading-aside-num{font-size:64px}
  .reading-question-text{font-size:17px}
  .reading-toc-item{padding:8px 0;font-size:14px}
  .reading-toc-label{font-size:14px}

  .reading-main{padding:36px 22px}
  .reading-header{margin-bottom:36px;padding-bottom:24px}
  .reading-eyebrow{margin-bottom:14px;font-size:10.5px}
  .reading-title{font-size:36px;margin-bottom:14px;line-height:1.02}
  .reading-lede{font-size:18px}
  .rsection{margin-bottom:36px}
  .rsection-heading{font-size:21px;gap:10px;margin-bottom:12px}
  .rsection-p{font-size:16px;line-height:1.6}
  .rsection-bullets li{font-size:15px}
  .rsection-steps li{gap:12px;padding:12px 0}
  .rsection-step-num{font-size:20px}
  .rsection-step-text{font-size:15.5px}
  .rsection-sub-heading{font-size:17px}

  .ideas-block{padding:24px 20px;margin:36px 0}
  .ideas-list li{font-size:16px;gap:10px}
  .ia-block{padding:24px 20px;margin:36px 0 24px}
  .ia-title{font-size:20px}
  .ia-p{font-size:15.5px}
  .ia-bullets li{font-size:14px}

  .reading-close-row{margin-top:32px;padding-top:24px;gap:14px}
  .reading-close{padding:12px 18px;font-size:11px}
  .reading-close-note{font-size:14.5px}

  /* Final invitation */
  .invitation-quote{padding:48px 28px;min-height:auto}
  .quote-mark{top:18px;left:20px;font-size:120px}
  .invitation-quote blockquote{font-size:20px;margin-bottom:32px}
  .invitation-body{padding:48px 28px}
  .invitation-title{font-size:30px}
  .invitation-text{font-size:15.5px}
  .commitment select,
  .commitment textarea{font-size:16px;padding:12px 14px}
  .commitment-save,
  .commitment-edit,
  .commitment-clear,
  .commitment-cancel{padding:11px 18px;font-size:11px}
  .commitment-saved-card{padding:24px 22px}
  .commitment-saved-chapter{font-size:20px}
  .commitment-saved-text{font-size:16px}

  .footer{padding:36px 22px;margin-top:48px}
  .footer-inner{gap:24px}
  .footer-line{font-size:13px}

  /* FAB compact on mobile already handled — ensure tap target */
  .reading-fab{min-height:44px;min-width:44px}
}

/* ──────────────────────── ENSURE TAP TARGETS ──────────────────────── */
@media (hover: none) and (pointer: coarse){
  /* Stop hover-only states from sticking on touch screens */
  .card:hover{box-shadow:none;transform:none}
  .card:hover::after{height:10px;transform:none;opacity:.85}
  .card:hover .card-rail-num{transform:none}
  .card:hover .card-chevron{
    background:var(--c-surface);
    color:var(--c-inkMuted);
    border-color:var(--c-rule);
    transform:none;
  }
  .card:hover .card-cta-hint{color:var(--c-ink)}
  .card:hover .card-cta-arrow{transform:none}
  /* Show the reflective question by default on touch (no hover affordance) */
  .card-question{opacity:1;max-height:none;padding-top:14px}
}

/* ──────────────────────── REDUCED MOTION ──────────────────────── */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{
    animation-duration:.01ms !important;
    transition-duration:.01ms !important;
  }
}
