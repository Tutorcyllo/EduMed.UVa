      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');

      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);

        let finalBytes = bytes;
        if (entry.compressed) {

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {

      } catch (err) {

      }

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.

    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;

        s.textContent = await r.text();
        s.removeAttribute('src');
      }

      old.replaceWith(s);

    // which fired before we swapped the document. Trigger manually if present.

      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Source Serif 4';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"134b77d3-ff82-43fe-be97-a56f5189184a\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Source Serif 4';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"4cf8eed2-38c6-48cd-93df-cc2da4949449\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Source Serif 4';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"4679edcc-fa3c-47ab-9b69-6f46deeda439\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n  <style>/* ====================================================================\n   EduMed · UVa — base de estilos\n   Kit mínimo para mantener identidad visual: tokens + tipografía\n   + barra institucional + utilidades de sección.\n   Crece tus propios componentes encima.\n   ==================================================================== */\n\n:root {\n  /* Paleta — blancos cálidos, tinta cálida */\n  --bg: oklch(0.975 0.008 75);\n  --bg-deep: oklch(0.95 0.012 75);\n  --surface: oklch(0.995 0.004 80);\n  --surface-2: oklch(0.985 0.008 75);\n  --ink: oklch(0.22 0.018 55);\n  --ink-soft: oklch(0.42 0.018 55);\n  --ink-mute: oklch(0.58 0.015 55);\n  --line: oklch(0.88 0.012 70);\n  --line-strong: oklch(0.78 0.015 65);\n\n  /* Acento principal — terracota cálida */\n  --accent: oklch(0.55 0.13 35);\n  --accent-deep: oklch(0.42 0.13 35);\n  --accent-soft: oklch(0.94 0.04 40);\n  --accent-tint: oklch(0.97 0.018 40);\n\n  /* Acento secundario — salvia (atención / reglas) */\n  --sage: oklch(0.5 0.05 155);\n  --sage-soft: oklch(0.94 0.025 155);\n\n  /* Tipografía */\n  --serif: \"Source Serif 4\", Georgia, \"Times New Roman\", serif;\n  --sans: \"DM Sans\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif;\n  --mono: \"JetBrains Mono\", ui-monospace, \"SF Mono\", Menlo, monospace;\n\n  --radius: 14px;\n  --radius-sm: 8px;\n  --radius-lg: 22px;\n}\n\n* { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nbody {\n  background: var(--bg);\n  color: var(--ink);\n  font-family: var(--sans);\n  font-size: 17px;\n  line-height: 1.55;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  font-feature-settings: \"ss01\", \"kern\";\n}\n\nbutton { font: inherit; color: inherit; cursor: pointer; }\na {\n  color: var(--accent-deep);\n  text-decoration: underline;\n  text-underline-offset: 3px;\n  text-decoration-thickness: 1px;\n}\na:hover { color: var(--accent); }\n\n/* === Barra institucional EduMed ======================================== */\n\n.edumed-bar {\n  display: block;\n  background: #f5c518;\n  border-bottom: 1px solid #d9a800;\n  box-shadow: 0 1px 0 rgba(0,0,0,.04), 0 4px 14px rgba(0,0,0,.06);\n  text-decoration: none;\n  color: inherit;\n  position: relative;\n  z-index: 50;\n}\n.edumed-bar-inner {\n  max-width: 1200px;\n  margin: 0 auto;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 16px;\n  padding: 12px 20px;\n}\n.edumed-brand {\n  display: flex;\n  align-items: center;\n  gap: 14px;\n  color: #1a1f2e;\n}\n.edumed-wordmark {\n  display: flex;\n  flex-direction: column;\n  line-height: 1.1;\n  font-family: var(--sans);\n}\n.edumed-wordmark .w1 {\n  font-weight: 700;\n  font-size: 18px;\n  letter-spacing: -.01em;\n  color: #1a1f2e;\n}\n.edumed-wordmark .w1 .sep {\n  opacity: .45;\n  margin: 0 4px;\n  font-weight: 500;\n}\n.edumed-wordmark .w2 {\n  font-weight: 500;\n  font-size: 10.5px;\n  letter-spacing: .08em;\n  color: #1a1f2e;\n  opacity: .8;\n  margin-top: 3px;\n}\n.edumed-back {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  font-family: var(--sans);\n  font-size: 13px;\n  font-weight: 600;\n  color: #1a1f2e;\n  padding: 8px 14px;\n  border-radius: 999px;\n  background: rgba(255,255,255,.55);\n  border: 1px solid rgba(26,31,46,.15);\n  transition: background .15s ease, transform .15s ease;\n  white-space: nowrap;\n}\n.edumed-bar:hover .edumed-back {\n  background: #fff;\n  transform: translateX(-2px);\n}\n.edumed-back svg { width: 14px; height: 14px; }\n@media (max-width: 540px) {\n  .edumed-wordmark .w2 { display: none; }\n  .edumed-back { padding: 7px 10px; font-size: 12px; }\n}\n\n/* === Estructura general ================================================ */\n\n.shell {\n  max-width: 1180px;\n  margin: 0 auto;\n  padding: 56px 40px 120px;\n}\n@media (max-width: 720px) {\n  .shell { padding: 32px 20px 80px; }\n}\n\n.section { margin-top: 88px; }\n.section-eyebrow {\n  font-family: var(--mono);\n  font-size: 12px;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--ink-mute);\n  margin: 0 0 10px;\n  display: flex;\n  align-items: center;\n  gap: 12px;\n}\n.section-eyebrow::before {\n  content: \"\";\n  width: 28px; height: 1px;\n  background: var(--ink-mute);\n  display: inline-block;\n}\n.section-title {\n  font-family: var(--serif);\n  font-weight: 400;\n  font-size: clamp(28px, 3.4vw, 40px);\n  line-height: 1.1;\n  letter-spacing: -0.015em;\n  margin: 0 0 14px;\n  color: var(--ink);\n  text-wrap: balance;\n}\n.section-title em {\n  font-style: italic;\n  color: var(--accent-deep);\n}\n.section-lead {\n  font-family: var(--serif);\n  font-size: 19px;\n  line-height: 1.55;\n  color: var(--ink-soft);\n  max-width: 68ch;\n  margin: 0 0 28px;\n  text-wrap: pretty;\n}\n\n/* === Botones ========================================================== */\n\n.btn {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  padding: 14px 22px;\n  font-family: var(--sans);\n  font-size: 15px;\n  font-weight: 500;\n  background: var(--ink);\n  color: var(--bg);\n  border: 1px solid var(--ink);\n  border-radius: 999px;\n  text-decoration: none;\n  transition: background .15s ease, transform .15s ease;\n}\n.btn:hover { background: var(--accent-deep); border-color: var(--accent-deep); color: var(--bg); }\n.btn.ghost {\n  background: transparent;\n  color: var(--ink);\n}\n.btn.ghost:hover { background: var(--ink); color: var(--bg); }\n<\u002Fstyle>\n  <style>/* ====================================================================\n   NotebookLM para Profesores de Medicina — estilos del webapp\n   Construido sobre edumed-base.css. Misma paleta y tipografía.\n   ==================================================================== */\n\n/* === EduMed bar overrides (dos enlaces separados + sticky) =========== */\n\n.edumed-bar {\n  position: sticky;\n  top: 0;\n  z-index: 60;\n}\n.edumed-bar a { text-decoration: none; color: inherit; }\n.edumed-brand { transition: opacity .12s ease; }\n.edumed-brand:hover { opacity: 0.75; }\n/* Anular el hover global de la base: ahora cada enlace gestiona el suyo */\n.edumed-bar:hover .edumed-back { background: transparent; transform: none; }\n.edumed-back:hover { background: #fff !important; transform: translateX(-2px) !important; }\n\n/* === Navegación principal de zonas ==================================== */\n\n.zone-nav {\n  position: sticky;\n  top: 62px;\n  z-index: 40;\n  background: var(--bg);\n  border-bottom: 1px solid var(--line);\n}\n.zone-nav-inner {\n  max-width: 1180px;\n  margin: 0 auto;\n  padding: 0 40px;\n  display: flex;\n  align-items: center;\n  gap: 4px;\n  overflow-x: auto;\n  scrollbar-width: none;\n}\n.zone-nav-inner::-webkit-scrollbar { display: none; }\n.zone-tab {\n  appearance: none;\n  background: transparent;\n  border: 0;\n  padding: 18px 4px;\n  margin: 0 18px 0 0;\n  font-family: var(--sans);\n  font-size: 14px;\n  font-weight: 500;\n  color: var(--ink-mute);\n  position: relative;\n  white-space: nowrap;\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n}\n.zone-tab .num {\n  font-family: var(--mono);\n  font-size: 11px;\n  color: var(--ink-mute);\n  opacity: .7;\n}\n.zone-tab:hover { color: var(--ink); }\n.zone-tab[aria-selected=\"true\"] { color: var(--ink); }\n.zone-tab[aria-selected=\"true\"]::after {\n  content: \"\";\n  position: absolute;\n  left: 0; right: 0; bottom: 0;\n  height: 2px;\n  background: var(--accent-deep);\n  border-radius: 2px 2px 0 0;\n}\n.zone-tab[aria-selected=\"true\"] .num { color: var(--accent-deep); opacity: 1; }\n@media (max-width: 720px) {\n  .zone-nav-inner { padding: 0 20px; gap: 0; }\n  .zone-tab { margin-right: 14px; padding: 16px 2px; }\n}\n\n/* === Hero ============================================================ */\n\n.hero {\n  padding-top: 72px;\n  padding-bottom: 24px;\n}\n.hero-eyebrow {\n  font-family: var(--mono);\n  font-size: 12px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--accent-deep);\n  margin: 0 0 22px;\n  display: flex;\n  align-items: center;\n  gap: 12px;\n}\n.hero-eyebrow::before {\n  content: \"\";\n  width: 36px; height: 1px;\n  background: var(--accent-deep);\n}\n.hero h1 {\n  font-family: var(--serif);\n  font-weight: 400;\n  font-style: italic;\n  font-size: clamp(38px, 5.6vw, 68px);\n  line-height: 1.04;\n  letter-spacing: -0.02em;\n  margin: 0 0 28px;\n  color: var(--ink);\n  text-wrap: balance;\n  max-width: 22ch;\n}\n.hero h1 .strong {\n  font-style: normal;\n  color: var(--accent-deep);\n}\n.hero-lead {\n  font-family: var(--serif);\n  font-size: clamp(19px, 1.8vw, 22px);\n  line-height: 1.55;\n  color: var(--ink-soft);\n  max-width: 62ch;\n  margin: 0 0 36px;\n  text-wrap: pretty;\n}\n
